<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kütüphane</title>
  <link rel="stylesheet" href="/vendor/liquid-glass/styles/liquid-glass.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">📚 <span>Kütüphane</span></div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input type="search" id="search" placeholder="Kitap veya yazar ara...">
      </div>
      <button id="add-book-btn" class="btn-add" hidden>+ Kitap Ekle</button>
      <button id="loans-btn" class="btn-loans" hidden>Ödünçler</button>
      <button id="stats-btn" class="btn-loans" hidden>İstatistik</button>
      <div class="lang-switch" id="lang-switch" data-lang="tr" aria-label="Dil / Language">
        <span class="lang-opt active" data-lang="tr">TR</span>
        <span class="lang-opt" data-lang="en">EN</span>
        <div class="lang-knob" id="lang-knob"></div>
      </div>
      <span class="user-chip" id="user-chip" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span id="user-name"></span>
      </span>
      <button id="settings-btn" class="icon-btn" title="Ayarlar" aria-label="Ayarlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <button id="logout-btn">Çıkış</button>
    </div>
  </header>

  <main class="container">
    <div class="due-banner" id="due-banner" hidden></div>
    <section class="filters">
      <div class="genre-chips" id="genre-chips">
        <button class="chip active" data-genre="">Tümü</button>
      </div>

      <div class="genre-chips shelf-chips" id="shelf-chips">
        <button class="chip active" data-shelf="">Tüm Kitaplar</button>
        <button class="chip" data-shelf="favorites">♥ Favorilerim</button>
        <button class="chip" data-shelf="toread">Okuyacaklarım</button>
        <button class="chip" data-shelf="read">Okuduklarım</button>
        <button class="chip" data-shelf="borrowed">Ödünç Aldıklarım</button>
        <button class="chip" data-shelf="recommended">✨ Sana Özel</button>
      </div>

      <div class="filter-row">
        <div class="filter-group">
          <label for="year-min">Yıl</label>
          <input type="number" id="year-min" placeholder="Başlangıç" class="year-input">
          <span class="dash">–</span>
          <input type="number" id="year-max" placeholder="Bitiş" class="year-input">
        </div>

        <div class="filter-group">
          <label for="sort">Sırala</label>
          <select id="sort">
            <option value="title">Başlığa göre (A–Z)</option>
            <option value="rating">Puana göre</option>
            <option value="year-desc">Yıla göre (yeni → eski)</option>
            <option value="year-asc">Yıla göre (eski → yeni)</option>
          </select>
        </div>

        <span class="result-count" id="result-count"></span>
      </div>
    </section>

    <section class="book-grid" id="book-grid"></section>
    <p class="empty-state" id="empty-state" hidden>Aradığınız kriterlere uygun kitap bulunamadı. 🔍</p>
    <nav class="pagination" id="pagination" aria-label="Sayfalar" hidden></nav>
  </main>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <!-- Liquid glass: arkaplanı büken kırılma (refraction) filtresi -->
  <svg style="display:none" aria-hidden="true">
    <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox">
      <feTurbulence type="fractalNoise" baseFrequency="0.001 0.005" numOctaves="1" seed="17" result="turbulence"/>
      <feComponentTransfer in="turbulence" result="mapped">
        <feFuncR type="gamma" amplitude="1" exponent="10" offset="0.5"/>
        <feFuncG type="gamma" amplitude="0" exponent="1" offset="0"/>
        <feFuncB type="gamma" amplitude="0" exponent="1" offset="0.5"/>
      </feComponentTransfer>
      <feGaussianBlur in="turbulence" stdDeviation="3" result="softMap"/>
      <feSpecularLighting in="softMap" surfaceScale="5" specularConstant="1" specularExponent="100" lighting-color="white" result="specLight">
        <fePointLight x="-200" y="-200" z="300"/>
      </feSpecularLighting>
      <feComposite in="specLight" operator="in" in2="SourceGraphic" result="specularSaturated"/>
      <feDisplacementMap in="SourceGraphic" in2="softMap" scale="110" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </svg>

  <script src="/js/theme.js"></script>
  <script src="/vendor/liquid-glass/dist/liquid-glass.umd.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
